name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Build Windows amd64
        run: GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o restic-sentry.exe ./
      - uses: actions/upload-artifact@v4
        with:
          name: restic-sentry-windows-amd64
          path: restic-sentry.exe
